name: lab3-imdb-ci

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "run_lab3.py"
      - "src/**"
      - "requirements.txt"
      - ".github/workflows/imdb-ci.yml"

jobs:
  imdb-smoke-test:
    runs-on: ubuntu-latest
    env:
      HF_HOME: ${{ github.workspace }}/.cache/huggingface
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Cache Hugging Face data
        uses: actions/cache@v4
        with:
          path: ${{ env.HF_HOME }}
          key: ${{ runner.os }}-hf-imdb-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-hf-imdb-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run IMDB smoke test
        run: |
          python run_lab3.py \
            --dataset imdb \
            --seed 42 \
            --max_rows 200 \
            --vocab_size 5000 \
            --max_len 128 \
            --embed_dim 32 \
            --hidden_dim 32 \
            --batch_size 16 \
            --epochs 2 \
            --lr 1e-3 \
            --dropout 0.2 \
            --use_wandb \
            --wandb_mode offline
      - name: Check required outputs
        run: |
          test -f outputs/logs/sequence_audit.md
          test -f outputs/metrics/epoch_history.csv
          test -f outputs/metrics/metrics_summary.json
          test -f outputs/metrics/metrics_summary.md
          test -f outputs/metrics/baseline_vs_rnn.csv
          test -f outputs/figures/loss_curve.png
          test -f outputs/figures/metric_curve.png
          test -f outputs/figures/confusion_matrix.png
          test -f outputs/models/best_model.pt
          test -f outputs/predictions/test_predictions.csv
          test -f outputs/error_analysis/error_analysis.csv
          test -f outputs/error_analysis/error_analysis_summary.md
          test -f outputs/logs/run_summary.json
